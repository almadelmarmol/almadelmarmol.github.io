<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alma del Mármol</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

header {
  text-align: center;
  padding: 40px;
  background: #1a1a1a;
}

h1 {
  margin: 0;
  font-size: 36px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 40px;
}

.card {
  background: #1f1f1f;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: gold;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>Alma del Mármol</h1>
  <p>Arte en mármol con esencia única</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="pieza">
    <h3>Pieza 1</h3>
    <button>Comprar</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" alt="pieza">
    <h3>Pieza 2</h3>
    <button>Comprar</button>
  </div>

</div>

</body>
</html>
