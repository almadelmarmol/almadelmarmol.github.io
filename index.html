<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alma del Mármol</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
            color: white;
        }

        header {
            text-align: center;
            padding: 40px;
            background: linear-gradient(black, #1a1a1a);
        }

        h1 {
            margin: 0;
            font-size: 40px;
            letter-spacing: 2px;
        }

        p {
            color: #ccc;
        }

        .productos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .producto {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .producto img {
            width: 100%;
            border-radius: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: gold;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <h1>Alma del Mármol</h1>
    <p>Arte en mármol con esencia única</p>
</header>

<section class="productos">

    <div class="producto">
        <img src="https://via.placeholder.com/300" alt="">
        <h3>Pieza 1</h3>
        <a class="btn" href="#">Comprar</a>
    </div>

    <div class="producto">
        <img src="https://via.placeholder.com/300" alt="">
        <h3>Pieza 2</h3>
        <a class="btn" href="#">Comprar</a>
    </div>

</section>

</body>
</html>
